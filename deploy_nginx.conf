server {
    listen 80;
    listen [::]:80;
    server_name kozymonetaryraider.com www.kozymonetaryraider.com 107.174.127.26;

    root /var/www/ian;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;
    gzip_min_length 1000;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /images/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
